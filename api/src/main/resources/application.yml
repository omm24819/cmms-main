spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/cmms
    username: postgres
    password: Ommishra1449@
    driver-class-name: org.postgresql.Driver
    hikari:
      leak-detection-threshold: 60000
      maximum-pool-size: 20

  jackson:
    serialization:
      fail-on-empty-beans: false

  quartz:
    job-store-type: jdbc
    jdbc:
      initialize-schema: never
    properties:
      org.quartz.jobStore.driverDelegateClass: org.quartz.impl.jdbcjobstore.PostgreSQLDelegate

  liquibase:
    change-log: classpath:/db/master.xml
    enabled: true

  messages:
    encoding: UTF-8

  servlet:
    multipart:
      max-request-size: 100MB
      max-file-size: 35MB

  profiles:
    active: dev

  mvc:
    pathmatch:
      matching-strategy: ant_path_matcher

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        enable_lazy_load_no_trans: true
        default_batch_fetch_size: 64
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
        id:
          new_generator_mappings: false
    defer-datasource-initialization: false

  sql:
    init:
      mode: always

  mail:
    host: smtp.gmail.com
    port: 587
    username: test@gmail.com
    password: testpassword
    protocol: smtp
    tls: true
    from: test@gmail.com
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
          ssl:
            trust: smtp.gmail.com

  cache:
    type: caffeine

server:
  port: 8080

security:
  jwt:
    token:
      secret-key: mysupersecretkeymysupersecretkeymysupersecretkeymysupersecretkey
      expire-length: 1209600000

  invitation-via-email: false
  recaptcha-secret-key: ""
  cors:
    enabled: true

  rate-limit:
    enabled: true
    authenticated:
      short-term-requests: 100
      short-term-period-minutes: 1
      long-term-requests: 1000
      long-term-period-hours: 1

frontend:
  url: http://localhost:3000
  home-url: http://localhost:3000

mail:
  recipients: test@example.com
  enable: false
  type: SMTP

superAdmin:
  role:
    name: SuperAdministrator

management:
  health:
    mail:
      enabled: true
    ldap:
      enabled: false

api:
  host: http://localhost:8080

storage:
  type: MINIO
  minio:
    endpoint: ""
    bucket: ""
    access-key: ""
    secret-key: ""
    public-endpoint: ""
  gcp:
    project-id: ""
    bucket-name: ""
    value: ""
    json-path: ""

allowed-organization-admins: ""
cloud-version: false
enable-sso: false

oauth2:
  success-redirect-url: http://localhost:3000/oauth2/success
  failure-redirect-url: http://localhost:3000/oauth2/failure
  provider: local

license-key: ""
license-fingerprint-required: true
license-file-path: ""

white-labeling:
  logo-paths: ""
  custom-colors: ""
  brand-config: ""

ldap:
  enabled: false
  org-admin: ""
  url: ldap://localhost:389
  base-dn: ""
  sync:
    enabled: true
    create: true
    update: true
    disable: false
    cron: "0 0 0,12 * * ?"
  ou-role-mappings: ""
  user-search-bases: ""
  user-search-filter: "(uid={0})"
  search-subtree: true
  manager-dn: ""
  manager-password: ""
  attributes:
    email: mail
    first-name: givenName
    last-name: sn
    username: uid
    object-class: inetOrgPerson

paddle:
  api-key: ""
  environment: sandbox
  webhook-secret-key: ""

keygen:
  product-token: ""
  account-id: 1ca3e517-f3d8-473f-a45c-81069900acb7

sendgrid:
  api:
    key: ""
  contact-list-id: ""
  from:
    email: ""

intercom:
  token: ""

springdoc:
  api-docs:
    version: openapi_3_1
  swagger-ui:
    tags-sorter: alpha